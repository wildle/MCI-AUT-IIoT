<h3 id="receiver-operating-characteristic-roc-curve">Receiver Operating Characteristic (ROC) Curve</h3>
<ul>
<li>Vergleicht die True Positive Rate (Recall) mit der False Positive Rate</li>
<li>AUC (Area Under the Curve) gibt die Fläche unter der ROC-Kurve an</li>
<li>Ein AUC von <mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: 0;" xmlns="http://www.w3.org/2000/svg" width="1.131ex" height="1.507ex" role="img" focusable="false" viewBox="0 -666 500 666"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="mn"><path data-c="31" d="M213 578L200 573Q186 568 160 563T102 556H83V602H102Q149 604 189 617T245 641T273 663Q275 666 285 666Q294 666 302 660V361L303 61Q310 54 315 52T339 48T401 46H427V0H416Q395 3 257 3Q121 3 100 0H88V46H114Q136 46 152 46T177 47T193 50T201 52T207 57T213 61V578Z"></path></g></g></g></svg></mjx-container> bedeutet ein perfektes Modell, ein AUC von <mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: -0.05ex;" xmlns="http://www.w3.org/2000/svg" width="2.891ex" height="1.557ex" role="img" focusable="false" viewBox="0 -666 1278 688"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="mn"><path data-c="30" d="M96 585Q152 666 249 666Q297 666 345 640T423 548Q460 465 460 320Q460 165 417 83Q397 41 362 16T301 -15T250 -22Q224 -22 198 -16T137 16T82 83Q39 165 39 320Q39 494 96 585ZM321 597Q291 629 250 629Q208 629 178 597Q153 571 145 525T137 333Q137 175 145 125T181 46Q209 16 250 16Q290 16 318 46Q347 76 354 130T362 333Q362 478 354 524T321 597Z"></path><path data-c="2E" d="M78 60Q78 84 95 102T138 120Q162 120 180 104T199 61Q199 36 182 18T139 0T96 17T78 60Z" transform="translate(500,0)"></path><path data-c="35" d="M164 157Q164 133 148 117T109 101H102Q148 22 224 22Q294 22 326 82Q345 115 345 210Q345 313 318 349Q292 382 260 382H254Q176 382 136 314Q132 307 129 306T114 304Q97 304 95 310Q93 314 93 485V614Q93 664 98 664Q100 666 102 666Q103 666 123 658T178 642T253 634Q324 634 389 662Q397 666 402 666Q410 666 410 648V635Q328 538 205 538Q174 538 149 544L139 546V374Q158 388 169 396T205 412T256 420Q337 420 393 355T449 201Q449 109 385 44T229 -22Q148 -22 99 32T50 154Q50 178 61 192T84 210T107 214Q132 214 148 197T164 157Z" transform="translate(778,0)"></path></g></g></g></svg></mjx-container> bedeutet ein zufälliges Modell</li>
<li>Die meisten Modelle geben eine Wahrscheinlichkeit für die Zugehörigkeit zu einer Klasse zurück</li>
<li>Wenn die Wahrscheinlichkeit über einem Schwellenwert  <mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: -0.023ex;" xmlns="http://www.w3.org/2000/svg" width="1.061ex" height="1.618ex" role="img" focusable="false" viewBox="0 -705 469 715"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="mi"><path data-c="1D703" d="M35 200Q35 302 74 415T180 610T319 704Q320 704 327 704T339 705Q393 701 423 656Q462 596 462 495Q462 380 417 261T302 66T168 -10H161Q125 -10 99 10T60 63T41 130T35 200ZM383 566Q383 668 330 668Q294 668 260 623T204 521T170 421T157 371Q206 370 254 370L351 371Q352 372 359 404T375 484T383 566ZM113 132Q113 26 166 26Q181 26 198 36T239 74T287 161T335 307L340 324H145Q145 321 136 286T120 208T113 132Z"></path></g></g></g></svg></mjx-container> liegt, wird die Instanz als positiv vorhergesagt</li>
<li>Entsprechen kann man über den Schwellenwert die True Positive Rate und die False Positive Rate variieren und die ROC-Kurve erstellen</li>
</ul>

</section>

<h2 id="modelle">Modelle</h2>
<ul>
<li data-marpit-fragment="1"><strong>Logistische Regression</strong>: Abwandlung der linearen Regression für Klassifikation</li>
<li data-marpit-fragment="2"><strong>kNearest Neighbors</strong>: Klassifiziert anhand der k nächsten Nachbarn</li>
<li data-marpit-fragment="3"><strong>Decision Trees</strong>: Organisiert die Daten in einem Baum und trifft Entscheidungen anhand von Regeln</li>
</ul>
<footer>Automatisierungstechnik</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="10" data-marpit-fragments="5" data-footer="Automatisierungstechnik" data-class="invert" data-paginate="true" data-theme="lemon" lang="de-DE" class="invert" data-marpit-pagination="10" style="--footer:Automatisierungstechnik;--class:invert;--paginate:true;--theme:lemon;" data-marpit-pagination-total="23" data-size="16:9">
<h3 id="entscheidungsb%C3%A4ume--decision-trees">Entscheidungsbäume / Decision Trees</h3>
<center>
<p><img src="images/1_6RMrFGwU-qH4nHW89xc0Xw.jpeg" alt="" style="height:400px;" /></p>
</center>
<ul>
<li data-marpit-fragment="1">Jeder Knoten entspricht einer Entscheidung</li>
<li data-marpit-fragment="2">Jeder Blattknoten entspricht einer Klasse</li>
<li data-marpit-fragment="3">Der Baum wird anhand von Informations-Entropie oder Gini-Index erstellt</li>
<li data-marpit-fragment="4">Hyperparameter: Tiefe des Baumes, minimale Anzahl an Instanzen pro Blattknoten</li>
<li data-marpit-fragment="5">Erweiterungen: Random Forest, Gradient Boosting</li>
</ul>
<footer>Automatisierungstechnik</footer>
</section>
